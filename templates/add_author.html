<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>

  <main class="page-shell">
    <section class="form-card">
      <h1>Add an Author</h1>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="message {{ category }}">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      {% if errors %}
      <div class="message error">
        <ul>
          {% for field, error in errors.items() %}
          <li>{{ error }}</li>
          {% endfor %}
        </ul>
      </div>
      {% endif %}

      <form action="/add_author" method="POST">
        <div class="form-row">
          <label for="name">Author Name</label>
          <input
            type="text"
            id="name"
            name="name"
            value="{{ form.get('name') if form else '' }}"
            required
            pattern=".*\S.*"
            title="Author name cannot be empty or whitespace only."
          >
        </div>

        <div class="form-row">
          <label for="birthdate">Birthdate</label>
          <input type="date" id="birthdate" name="birthdate" required value="{{ form.get('birthdate') if form else '' }}">
        </div>

        <div class="form-row">
          <label for="date_of_death">Date of Death</label>
          <input type="date" id="date_of_death" name="date_of_death" value="{{ form.get('date_of_death') if form else '' }}">
        </div>

        <div class="form-actions">
          <button type="submit">Add Author</button>
        </div>
      </form>
    </section>
  </main>

  </body>
</html>
